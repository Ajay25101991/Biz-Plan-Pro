// PAGE: INVENTORY MODEL (tabbed)
// ════════════════════════════════════════════════════
function pgInventory(c){
  var inv=S.inv;
  var h='<h2>Inventory Model</h2><p class="subtitle">Season-based inventory planning tied to channel revenue · Cost basis: FOB × (1+Duty&Freight) + Purchase Royalty · Excludes sales royalty</p>';

  // ── Cost composition explainer (always visible) ──
  h+='<div class="cd accent"><h3>Cost Composition — How Unit Cost is Built</h3>';
  h+='<p style="font-size:12px;color:var(--t3);margin-bottom:12px">Inventory cost per ₹ of MRP uses only <strong>inventory-basis</strong> costs. Sales royalty (sales-linked), shrink, and supply-chain cost sit in the P&L separately. <strong>Discount</strong> shown is Year-1 weighted avg from seasonal discount grid below.</p>';
  var ccHd=['Channel','FOB %','Duty&Frt %','Purchase Roy %','Unit Cost (% MRP)','Yr1 Wtd Disc','NSV/MRP','Cost per ₹ NSV'];
  var ccRows=CK.map(function(k){
    var cs=S.cs[k];
    var ucr=(cs.fob||0)*(1+(cs.duty||0))+(cs.royalty||0);
    var wd=wtdDiscYear(k,0);
    var nsvMRP=(1-(cs.partnerM||0))*(1-(cs.gst||0))*(1-wd);
    var cpn=nsvMRP>0.01?(ucr/nsvMRP):0;
    return{
      Channel:CI[k]+' '+CN[k],
      'FOB %':fp(cs.fob),
      'Duty&Frt %':fp(cs.duty),
      'Purchase Roy %':fp(cs.royalty),
      'Unit Cost (% MRP)':fp(ucr),
      'Yr1 Wtd Disc':fp(wd),
      'NSV/MRP':fp(nsvMRP),
      'Cost per ₹ NSV':fp(cpn)
    };
  });
  h+=tbl(ccHd,ccRows)+'</div>';

  // ── Global assumptions ──
  h+='<div class="cd amber-l"><h3>Global Inventory Assumptions</h3>';
  h+='<div class="fg">';
  h+='<div class="fi"><label>Seasons per Year</label><select class="inp" onchange="uInvSPY(this.value)"><option value="2"'+(inv.seasonsPerYear===2?' selected':'')+'>2 (SS, AW)</option><option value="4"'+(inv.seasonsPerYear===4?' selected':'')+'>4 (Quarterly)</option></select></div>';
  h+='<div class="fi"><label>Season Life (N)</label>'+mi("uInv(\'seasonLife\',this.value,false)",inv.seasonLife,false)+'</div>';
  h+='<div class="fi"><label>Devaluation % on Terminal Stock</label>'+mi("uInv(\'devalRate\',this.value,true)",inv.devalRate,true)+'</div>';
  h+='<div class="fi"><label>Cover Ratio %</label>'+mi("uInv(\'coverRatio\',this.value,true)",inv.coverRatio,true)+'</div>';
  h+='<div class="fi"><label>Minimum Buy ₹ Cr / Season (MOQ)</label>'+mi("uInv(\'minBuyPerSeason\',this.value,false)",inv.minBuyPerSeason,false)+'</div>';
  h+='</div>';
  // Season split
  h+='<div style="margin-top:10px;padding:10px 12px;background:var(--s2);border-radius:6px">';
  h+='<div style="font-size:11px;color:var(--t3);font-weight:600;margin-bottom:6px">Seasonal Revenue Split (must sum to 100%)</div>';
  h+='<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">';
  inv.seasonSplit.forEach(function(v,i){
    var sLabel=inv.seasonsPerYear===2?(i===0?'SS (Apr–Sep)':'AW (Oct–Mar)'):'Q'+(i+1);
    h+='<div class="fi" style="padding:4px 8px"><label>'+sLabel+' %</label>'+mi("uInvSplit("+i+",this.value)",v,true)+'</div>';
  });
  var splitSum=inv.seasonSplit.reduce(function(a,v){return a+v;},0);
  h+='<span style="font-size:11px;color:'+(Math.abs(splitSum-1)>0.005?'var(--rd)':'var(--gn)')+';font-family:var(--m);padding:6px 10px;font-weight:700">Σ '+fp(splitSum)+'</span>';
  h+='</div></div></div>';

  // ── Per-channel sell-through & RTV settings ──
  h+='<div class="cd"><h3>Channel-wise Sell-through & RTV Settings</h3>';
  h+='<p style="font-size:11.5px;color:var(--t3);margin-bottom:10px">Sell-through is % of <strong>original buy</strong> that sells in each season of cohort life. Cumulative sell-through below 100% means residual goes to terminal devaluation after '+inv.seasonLife+' seasons.</p>';
  var csHd=['Channel','Sell S0','S1','S2','S3','S4','Cum %','RTV Return %','RTV Swap %','RTV Freight %'];
  var csRows=CK.map(function(k){
    var ch=inv.chSettings[k];
    var cum=ch.sellThru.reduce(function(a,v){return a+(v||0);},0);
    var r={Channel:CI[k]+' '+CN[k]};
    r['Sell S0']=mi("uInvChST(\'"+k+"\',0,this.value)",ch.sellThru[0],true);
    r.S1=mi("uInvChST(\'"+k+"\',1,this.value)",ch.sellThru[1],true);
    r.S2=mi("uInvChST(\'"+k+"\',2,this.value)",ch.sellThru[2],true);
    r.S3=mi("uInvChST(\'"+k+"\',3,this.value)",ch.sellThru[3],true);
    r.S4=mi("uInvChST(\'"+k+"\',4,this.value)",ch.sellThru[4],true);
    r['Cum %']='<span style="font-family:var(--m);font-weight:700;color:'+(cum>=0.95?'var(--gn)':cum>=0.80?'var(--am)':'var(--rd)')+'">'+fp(cum)+'</span>';
    r['RTV Return %']=mi("uInvCh(\'"+k+"\',\'rtvReturnPct\',this.value,true)",ch.rtvReturnPct,true);
    r['RTV Swap %']=mi("uInvCh(\'"+k+"\',\'rtvSwapPct\',this.value,true)",ch.rtvSwapPct,true);
    r['RTV Freight %']=mi("uInvCh(\'"+k+"\',\'rtvFreightRate\',this.value,true)",ch.rtvFreightRate,true);
    return r;
  });
  h+=tbl(csHd,csRows)+'</div>';

  // ── Seasonal Discount grid ──
  var NS=10*inv.seasonsPerYear;
  var sLabels=[];
  for(var _y=0;_y<10;_y++) for(var _s=0;_s<inv.seasonsPerYear;_s++){
    sLabels.push('Y'+(_y+1)+(inv.seasonsPerYear===2?(_s===0?'SS':'AW'):'Q'+(_s+1)));
  }
  h+='<div class="cd amber-l"><h3>Seasonal Discount by Channel <span class="badge" style="background:var(--amg);color:var(--am)">P&L LINK</span></h3>';
  h+='<p style="font-size:11.5px;color:var(--t3);margin-bottom:10px">Set discount % per season per channel. <strong>Weighted average</strong> flows into the P&L as a deduction from Gross Revenue. Use "Set All" to apply a flat rate across all seasons. First column stays frozen while you scroll.</p>';
  var dHd=['Channel','Set All','Yr1 Wtd','Yr10 Wtd','10yr Avg'].concat(sLabels);
  var dRows=CK.map(function(k){
    var ch=inv.chSettings[k];
    var r={Channel:CI[k]+' '+CN[k]};
    r['Set All']='<input class="inp" type="number" step="any" placeholder="Flat %" onchange="uInvChDAll(\''+k+'\',this.value)" style="width:70px">';
    r['Yr1 Wtd']='<span style="font-family:var(--m);font-weight:700;color:var(--ac)">'+fp(wtdDiscYear(k,0))+'</span>';
    r['Yr10 Wtd']='<span style="font-family:var(--m);font-weight:700;color:var(--ac)">'+fp(wtdDiscYear(k,9))+'</span>';
    // 10yr avg discount — simple mean across seasons
    var total=0;
    for(var i=0;i<NS;i++) total+=(ch.discountBySeason[i]||0);
    r['10yr Avg']='<span style="font-family:var(--m);font-weight:700;color:var(--ac)">'+fp(NS>0?total/NS:0)+'</span>';
    sLabels.forEach(function(sl,i){
      r[sl]=mi("uInvChDS(\'"+k+"\',"+i+",this.value)",ch.discountBySeason[i]||0,true);
    });
    return r;
  });
  // Add weighted-avg-across-channels footer row (if any channel has revenue)
  var hasRev=CK.some(function(k){return c.R[k].rv.some(function(v){return v>0;});});
  if(hasRev){
    var wtdRow={Channel:'<strong>Wtd avg (across ch)</strong>',_c:'tot','Set All':'','Yr1 Wtd':'','Yr10 Wtd':'','10yr Avg':''};
    sLabels.forEach(function(sl,i){
      wtdRow[sl]=fp(wtdDiscSeasonAll(i,c.R));
    });
    dRows.push(wtdRow);
  }
  h+=tbl(dHd,dRows)+'</div>';

  // ── Stock Floors (Min Store + Safety Warehouse) ──
  h+='<div class="cd blue-l"><h3>Stock Floors — Min Store Stock + Safety Warehouse <span class="badge" style="background:var(--blg);color:var(--bl)">BUY DRIVER</span></h3>';
  h+='<p style="font-size:11.5px;color:var(--t3);margin-bottom:10px">Both floors are <strong>days of sales cover</strong>. They add to cohort-driven buys when floor grows (demand ramps up). Online channels typically have zero store stock but larger warehouse coverage.</p>';
  var sfHd=['Channel','Min Store Stock (days)','Safety Warehouse (days)','Total Floor (days)','Yr1 Floor Value','Yr10 Floor Value'];
  var sfRows=CK.map(function(k){
    var ch=inv.chSettings[k], cs=S.cs[k];
    var total=(ch.minStoreStockDays||0)+(ch.safetyWarehouseDays||0);
    // Compute floor value at cost for Y1 and Y10
    var ucr=(cs.fob||0)*(1+(cs.duty||0))+(cs.royalty||0);
    var seasonDays=365/inv.seasonsPerYear;
    var y1SeasonRv=(c.R[k].rv[0]||0)*(inv.seasonSplit[0]||0.5);
    var y10SeasonRv=(c.R[k].rv[9]||0)*(inv.seasonSplit[0]||0.5);
    var y1Demand=y1SeasonRv*ucr;
    var y10Demand=y10SeasonRv*ucr;
    var y1Floor=y1Demand*(total/seasonDays);
    var y10Floor=y10Demand*(total/seasonDays);
    return{
      Channel:CI[k]+' '+CN[k],
      'Min Store Stock (days)':mi("uInvChFloor(\'"+k+"\',\'minStoreStockDays\',this.value)",ch.minStoreStockDays,false),
      'Safety Warehouse (days)':mi("uInvChFloor(\'"+k+"\',\'safetyWarehouseDays\',this.value)",ch.safetyWarehouseDays,false),
      'Total Floor (days)':'<span style="font-family:var(--m);font-weight:700;color:var(--bl)">'+total+'</span>',
      'Yr1 Floor Value':fCr(y1Floor),
      'Yr10 Floor Value':fCr(y10Floor)
    };
  });
  h+=tbl(sfHd,sfRows)+'</div>';

  // ── Compute inventory for all channels that have revenue ──
  var invResults={};
  CK.forEach(function(k){
    if(c.R[k].nv.some(function(v){return v>0;})){
      invResults[k]=calcInventory(k,c.R[k]);
    }
  });

  // ── Channel selector (shared across tabs) ──
  var active=invResults[_aCh]?_aCh:Object.keys(invResults)[0]||'ebo';
  h+='<div class="cd" style="padding:14px 20px"><div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">';
  h+='<span style="font-size:11px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:1px">Channel:</span>';
  CK.forEach(function(k){
    var hasData=!!invResults[k];
    var style=!hasData?'opacity:.4;cursor:not-allowed':'';
    h+='<span class="st'+(k===active?' on':'')+'" style="'+style+'" onclick="'+(hasData?"selInvCh(\'"+k+"\')":'')+'">'+CI[k]+' '+CN[k]+(hasData?'':' (no rev)')+'</span>';
  });
  h+='</div></div>';

  // ── Tabs ──
  h+='<div class="tabs">';
  h+='<div class="tab'+(_invTab==='setup'?' on':'')+'" onclick="setInvTab(\'setup\')">📊 Setup & Impact</div>';
  h+='<div class="tab'+(_invTab==='movement'?' on':'')+'" onclick="setInvTab(\'movement\')">📦 Inventory Movement</div>';
  h+='</div>';

  if(!invResults[active]){
    h+='<div class="cd" style="text-align:center;padding:36px;color:var(--t3)">No channel has revenue data. Add stores and fill KPIs first.</div>';
    return h;
  }

  // Split content by tab
  if(_invTab==='setup'){
    h+=renderInvSetupTab(c,invResults,active);
  } else {
    h+=renderInvMovementTab(c,invResults,active,inv);
  }
  return h;
}

// ── TAB: Setup & Impact ──
function renderInvSetupTab(c,invResults,active){
  var ir=invResults[active];
  var inv=S.inv;
  var h='';

  // KPIs
  var totBuys=sm(ir.annual.buys), totCohort=sm(ir.annual.cohortBuys), totFloor=sm(ir.annual.floorBuy);
  var totSales=sm(ir.annual.sales);
  var totDeval=sm(ir.annual.deval), totRTVFrt=sm(ir.annual.rtvFreight);
  var totRTVDuty=sm(ir.annual.rtvDutyLoss), totRTVRet=sm(ir.annual.rtvReturn);
  var finalClosing=ir.annual.closing[9];
  var finalFloor=ir.annual.floorStock[9];
  var peakClosing=Math.max.apply(null,ir.annual.closing);

  h+='<div class="cd"><h3>'+CI[active]+' '+CN[active]+' — Key Metrics</h3>';
  h+='<div class="kpi-row">';
  h+='<div class="kpi-item"><div class="kpi-label">10-Yr Total Buys</div><div class="kpi-val">'+fCr(totBuys)+'</div><div class="kpi-sub">Cohort '+fCr(totCohort)+' + Floor '+fCr(totFloor)+'</div></div>';
  h+='<div class="kpi-item"><div class="kpi-label">10-Yr Sales @ Cost</div><div class="kpi-val">'+fCr(totSales)+'</div></div>';
  h+='<div class="kpi-item"><div class="kpi-label">RTV Returned</div><div class="kpi-val">'+fCr(totRTVRet)+'</div></div>';
  h+='<div class="kpi-item"><div class="kpi-label">Terminal Devaluation</div><div class="kpi-val" style="color:var(--rd)">'+fCr(totDeval)+'</div></div>';
  h+='<div class="kpi-item"><div class="kpi-label">RTV Freight (opex)</div><div class="kpi-val" style="color:var(--rd)">'+fCr(totRTVFrt)+'</div></div>';
  h+='<div class="kpi-item"><div class="kpi-label">RTV Duty Loss</div><div class="kpi-val" style="color:var(--rd)">'+fCr(totRTVDuty)+'</div></div>';
  h+='<div class="kpi-item"><div class="kpi-label">Peak Inventory</div><div class="kpi-val">'+fCr(peakClosing)+'</div></div>';
  h+='<div class="kpi-item"><div class="kpi-label">Yr 10 Floor Stock</div><div class="kpi-val">'+fCr(finalFloor)+'</div><div class="kpi-sub">safety reserve</div></div>';
  h+='<div class="kpi-item"><div class="kpi-label">Yr 10 Total Closing</div><div class="kpi-val">'+fCr(finalClosing)+'</div></div>';
  h+='</div></div>';

  // Offline/Online split
  h+='<div class="cd blue-l"><h3>Offline vs Online Channel Split</h3>';
  var buckets={offline:{buys:0,sales:0,deval:0,rtvFrt:0,rtvDuty:0,closing:0,channels:[]},
               online:{buys:0,sales:0,deval:0,rtvFrt:0,rtvDuty:0,closing:0,channels:[]}};
  CK.forEach(function(k){
    if(!invResults[k]) return;
    var bkt=S.inv.channelType[k]||'offline';
    var ann=invResults[k].annual;
    buckets[bkt].buys+=sm(ann.buys);
    buckets[bkt].sales+=sm(ann.sales);
    buckets[bkt].deval+=sm(ann.deval);
    buckets[bkt].rtvFrt+=sm(ann.rtvFreight);
    buckets[bkt].rtvDuty+=sm(ann.rtvDutyLoss);
    buckets[bkt].closing+=ann.closing[9];
    buckets[bkt].channels.push(CN[k]);
  });
  var bHd=['Metric','🏬 Offline','🛒 Online','Total'];
  var bRows=[
    {Metric:'Channels included',_c:'dim','🏬 Offline':buckets.offline.channels.join(', ')||'—','🛒 Online':buckets.online.channels.join(', ')||'—','Total':''},
    {Metric:'10-Yr Buys','🏬 Offline':fCr(buckets.offline.buys),'🛒 Online':fCr(buckets.online.buys),Total:fCr(buckets.offline.buys+buckets.online.buys),_c:'sub'},
    {Metric:'10-Yr Sales @ Cost','🏬 Offline':fCr(buckets.offline.sales),'🛒 Online':fCr(buckets.online.sales),Total:fCr(buckets.offline.sales+buckets.online.sales)},
    {Metric:'Devaluation','🏬 Offline':fCr(buckets.offline.deval),'🛒 Online':fCr(buckets.online.deval),Total:fCr(buckets.offline.deval+buckets.online.deval)},
    {Metric:'RTV Freight','🏬 Offline':fCr(buckets.offline.rtvFrt),'🛒 Online':fCr(buckets.online.rtvFrt),Total:fCr(buckets.offline.rtvFrt+buckets.online.rtvFrt)},
    {Metric:'RTV Duty Loss','🏬 Offline':fCr(buckets.offline.rtvDuty),'🛒 Online':fCr(buckets.online.rtvDuty),Total:fCr(buckets.offline.rtvDuty+buckets.online.rtvDuty)},
    {Metric:'Year 10 Closing Inventory','🏬 Offline':fCr(buckets.offline.closing),'🛒 Online':fCr(buckets.online.closing),Total:fCr(buckets.offline.closing+buckets.online.closing),_c:'tot'}
  ];
  h+=tbl(bHd,bRows)+'</div>';

  // P&L impact
  h+='<div class="cd red-l"><h3>Impact on P&L — Inventory Model vs Current Simple Model</h3>';
  h+='<p style="font-size:11.5px;color:var(--t3);margin-bottom:10px">The current P&L applies a static <em>deval %</em> from Cost Sheet. The inventory model replaces this with cohort-based devaluation and surfaces RTV costs that aren\'t in the current model.</p>';
  var invCogs=zeros(), invOpex=zeros();
  var totSales2=zeros(), totDeval2=zeros(), totDuty2=zeros();
  CK.forEach(function(k){
    if(!invResults[k])return;
    var ann=invResults[k].annual;
    for(var y=0;y<10;y++){
      invCogs[y]+=ann.sales[y]+ann.deval[y]+ann.rtvDutyLoss[y];
      invOpex[y]+=ann.rtvFreight[y];
      totSales2[y]+=ann.sales[y]; totDeval2[y]+=ann.deval[y]; totDuty2[y]+=ann.rtvDutyLoss[y];
    }
  });
  var curCogs=c.T.cg;
  var cogsDelta=invCogs.map(function(v,i){return v-curCogs[i];});
  var dRows=[
    rw('Current Model COGS',curCogs),
    rw('Inventory Model COGS',invCogs,'sub'),
    rw('  └ Sales @ cost',totSales2,'dim'),
    rw('  └ Devaluation',totDeval2,'dim'),
    rw('  └ RTV duty loss',totDuty2,'dim'),
    rw('COGS Delta (new − current)',cogsDelta,'tot'),
    rw('RTV Freight — new opex line',invOpex,'tot')
  ];
  h+=tbl(HD,dRows)+'</div>';

  return h;
}

// ── TAB: Inventory Movement ──
function renderInvMovementTab(c,invResults,active,inv){
  var ir=invResults[active];
  var h='';

  // Build season labels
  var sLabels=[];
  for(var y=0;y<10;y++) for(var s=0;s<inv.seasonsPerYear;s++){
    sLabels.push('Y'+(y+1)+(inv.seasonsPerYear===2?(s===0?'SS':'AW'):'Q'+(s+1)));
  }

  // ── COHORT SELL-THROUGH GRID ──
  h+='<div class="cd accent"><h3>'+CI[active]+' '+CN[active]+' — Cohort Sell-through Grid</h3>';
  h+='<p style="font-size:11.5px;color:var(--t3);margin-bottom:10px">Each row is a buy cohort (by birth season). Cells show <strong>sales from that cohort in each calendar season</strong>. Cohort is active for '+inv.seasonLife+' seasons. Scroll horizontally — the cohort column stays frozen.</p>';

  var activeCohorts=ir.cohorts.filter(function(cg){return cg.buyValue>0.0001;});
  if(!activeCohorts.length){
    h+='<p style="color:var(--t3);text-align:center;padding:16px">No cohorts with buys. Add revenue in this channel.</p></div>';
  } else {
    var cHd=['Cohort (Birth)','Buy','RTV Ret'].concat(sLabels).concat(['Sold Σ','Deval','Leftover']);
    var cRows=activeCohorts.map(function(cg){
      var r={};
      r['Cohort (Birth)']=sLabels[cg.birthSeason];
      r['Buy']=fCr(cg.buyValue);
      r['RTV Ret']=cg.rtvReturn>0.0001?fCr(cg.rtvReturn):'';
      var totalSold=0;
      sLabels.forEach(function(sl,t){
        var amt=cg.salesBySeason[t]||0;
        totalSold+=amt;
        r[sl]=amt>0.0001?fCr(amt):'';
      });
      r['Sold Σ']=fCr(totalSold);
      r['Deval']=cg.deval>0.0001?fCr(cg.deval):'';
      var leftover=cg.buyValue-totalSold-(cg.rtvReturn||0)-(cg.deval||0);
      r['Leftover']=Math.abs(leftover)>0.0001?fCr(leftover):'';
      return r;
    });
    // Totals row
    var totRow={'Cohort (Birth)':'TOTAL',_c:'tot'};
    totRow['Buy']=fCr(activeCohorts.reduce(function(s,cg){return s+cg.buyValue;},0));
    totRow['RTV Ret']=fCr(activeCohorts.reduce(function(s,cg){return s+(cg.rtvReturn||0);},0));
    sLabels.forEach(function(sl,t){
      var colSum=activeCohorts.reduce(function(s,cg){return s+(cg.salesBySeason[t]||0);},0);
      totRow[sl]=colSum>0.0001?fCr(colSum):'';
    });
    totRow['Sold Σ']=fCr(activeCohorts.reduce(function(s,cg){
      var c_total=0;
      sLabels.forEach(function(_,t){c_total+=(cg.salesBySeason[t]||0);});
      return s+c_total;
    },0));
    totRow['Deval']=fCr(activeCohorts.reduce(function(s,cg){return s+(cg.deval||0);},0));
    var totLeft=activeCohorts.reduce(function(s,cg){
      var sld=0; sLabels.forEach(function(_,t){sld+=(cg.salesBySeason[t]||0);});
      return s+(cg.buyValue-sld-(cg.rtvReturn||0)-(cg.deval||0));
    },0);
    totRow['Leftover']=fCr(totLeft);
    cRows.push(totRow);
    h+=tbl(cHd,cRows)+'</div>';
  }

  // ── SEASON-LEVEL FLOW ──
  h+='<div class="cd"><h3>Season-Level Inventory Flow</h3>';
  h+='<p style="font-size:11.5px;color:var(--t3);margin-bottom:10px">Buys = Cohort Buys (for sell-through) + Floor Buys (safety-stock top-up). Closing = Working Inventory + Floor Stock. First column is frozen — scroll horizontally to see all seasons.</p>';
  var mHd=['Metric'].concat(sLabels);
  var mRows=[
    {Metric:'Demand (cost)',_c:'dim'},
    {Metric:'Opening Inventory (Total)'},
    {Metric:'  └ Working Opening',_c:'dim'},
    {Metric:'  └ Floor Opening',_c:'dim'},
    {Metric:'(+) Cohort Buys',_c:'sub'},
    {Metric:'(+) Floor Buy (safety top-up)',_c:'sub'},
    {Metric:'(+) Total Buys',_c:'tot'},
    {Metric:'(−) Sales @ Cost'},
    {Metric:'(−) RTV Returned',_c:'dim'},
    {Metric:'RTV Freight (opex)',_c:'dim'},
    {Metric:'RTV Duty Loss',_c:'dim'},
    {Metric:'(−) Devaluation',_c:'dim'},
    {Metric:'Working Closing',_c:'dim'},
    {Metric:'Floor Stock (Min+Safety)',_c:'dim'},
    {Metric:'Closing Inventory (Total)',_c:'tot'}
  ];
  ir.flow.forEach(function(f,t){
    var lbl=sLabels[t];
    mRows[0][lbl]=fCr(f.demand);
    mRows[1][lbl]=fCr(f.opening);
    mRows[2][lbl]=fCr(f.workingOpening);
    mRows[3][lbl]=fCr(f.floorOpening);
    mRows[4][lbl]=fCr(f.cohortBuys);
    mRows[5][lbl]=fCr(f.floorBuy);
    mRows[6][lbl]=fCr(f.buys);
    mRows[7][lbl]=fCr(f.sales);
    mRows[8][lbl]=fCr(f.rtvReturn);
    mRows[9][lbl]=fCr(f.rtvFreight);
    mRows[10][lbl]=fCr(f.rtvDutyLoss);
    mRows[11][lbl]=fCr(f.deval);
    mRows[12][lbl]=fCr(f.workingClosing);
    mRows[13][lbl]=fCr(f.floorStock);
    mRows[14][lbl]=fCr(f.closing);
  });
  h+=tbl(mHd,mRows)+'</div>';

  // ── ANNUAL ROLLUP ──
  h+='<div class="cd green-l"><h3>Annual Rollup</h3>';
  var aHd=['Metric'].concat(YR).concat(['10-Yr Total']);
  var aRows=[
    rw2('Cohort Buys',ir.annual.cohortBuys,'sub'),
    rw2('Floor Buy (safety top-up)',ir.annual.floorBuy,'sub'),
    rw2('Total Buys',ir.annual.buys,'tot'),
    rw2('Sales @ Cost',ir.annual.sales),
    rw2('RTV Returned',ir.annual.rtvReturn,'dim'),
    rw2('RTV Freight (opex)',ir.annual.rtvFreight,'dim'),
    rw2('RTV Duty Loss',ir.annual.rtvDutyLoss,'dim'),
    rw2('Devaluation',ir.annual.deval,'dim'),
    {Metric:'Working Closing (Yr-end)',_c:'dim'},
    {Metric:'Floor Stock (Yr-end)',_c:'dim'},
    {Metric:'Closing Inventory (Total, Yr-end)',_c:'tot'}
  ];
  YR.forEach(function(y,i){
    aRows[8][y]=fCr(ir.annual.workingClosing[i]);
    aRows[9][y]=fCr(ir.annual.floorStock[i]);
    aRows[10][y]=fCr(ir.annual.closing[i]);
  });
  aRows[8].Total='—'; aRows[9].Total='—'; aRows[10].Total='—';
  h+=tbl(aHd,aRows)+'</div>';

  return h;
}


function loadJS(u){return new Promise(function(r,j){
  if(document.querySelector('script[src="'+u+'"]')){r();return;}
  var s=document.createElement('script');s.src=u;s.onload=r;s.onerror=j;document.head.appendChild(s);
});}

    CK.forEach(function(k){
      var d=[['Store','Metric'].concat(YR)];
      R[k].stores.forEach(function(sc){
        [['NSV',sc.s.nv],['Gross Margin',sc.s.gm],['Rent',sc.s.rn],['Staff',sc.s.sf],['EBITDA',sc.s.eb],['EBIT',sc.s.ebit],['Capex',sc.s.cx]]
          .forEach(function(m){d.push([sc.name,m[0]].concat(m[1].map(function(v){return+v.toFixed(4);})));});
        d.push([]);
      });
      var sheetName=CN[k].replace(/[^\w]/g,'').slice(0,28);
      XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(d),sheetName);
    });
    XLSX.writeFile(wb,'BizPlan_'+S.name.replace(/[^\w]/g,'_')+'.xlsx');
    b.textContent='⬇ Excel'; toast('Excel exported','success');
  }).catch(function(e){toast('Excel export failed: '+e.message,'error');b.textContent='⬇ Excel';});
}

function xPDF(){
  var b=document.getElementById('bp'); b.textContent='⏳';
  loadJS('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js')
    .then(function(){return loadJS('https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js');})
    .then(function(){
    var c=calc(), T=c.T, CF=c.CF;
    var doc=new jspdf.jsPDF('l','mm','a4'), pw=doc.internal.pageSize.getWidth(), ph=doc.internal.pageSize.getHeight();
    var ok=c.irr>=(S.wacc[0]||.12);

    // Header
    doc.setFillColor(42,90,60); doc.rect(0,0,pw,18,'F');
    doc.setTextColor(255); doc.setFontSize(16); doc.setFont('helvetica','bold');
    doc.text('BizPlan Pro — '+S.name,14,12);
    doc.setFontSize(9); doc.setFont('helvetica','normal');
    doc.text('₹ Crores | 10-Year Plan | '+new Date().toLocaleDateString('en-IN'),pw-14,12,{align:'right'});

    // Decision banner
    var bc=ok?[26,122,66]:[166,38,38];
    doc.setFillColor(bc[0],bc[1],bc[2]); doc.roundedRect(14,22,pw-28,10,2,2,'F');
    doc.setTextColor(255); doc.setFontSize(11); doc.setFont('helvetica','bold');
    doc.text((ok?'✓ RECOMMENDED — GO':'✗ NOT RECOMMENDED — NO GO')+' | IRR: '+fp(c.irr)+' vs WACC: '+fp(S.wacc[0]||.12),pw/2,28.5,{align:'center'});
    doc.setTextColor(0);

    // KPI boxes
    var kpis=[['IRR',fp(c.irr)],['NPV',fCr(c.npv)],['NSV Yr10',fCr(T.nv[9])],['EBITDA% Yr10',T.nv[9]?fp(T.eb[9]/T.nv[9]):'—'],['PAT 10yr',fCr(sm(T.pat))],['Capex Total',fCr(sm(T.cx))]];
    var kw=(pw-28)/kpis.length, ky=36;
    kpis.forEach(function(kp,i){
      doc.setFillColor(247,245,242); doc.roundedRect(14+i*kw,ky,kw-2,14,2,2,'F');
      doc.setFontSize(7); doc.setTextColor(122,117,109); doc.setFont('helvetica','normal');
      doc.text(kp[0],14+i*kw+kw/2,ky+5,{align:'center'});
      doc.setFontSize(10); doc.setTextColor(28,26,22); doc.setFont('helvetica','bold');
      doc.text(kp[1],14+i*kw+kw/2,ky+11,{align:'center'});
    });

    // P&L table
    var startY=54;
    var cols=['Metric'].concat(YR).concat(['10-Yr Total']);
    var body=[
      ['NSV'].concat(T.nv.map(function(v){return fCr(v);})).concat([fCr(sm(T.nv))]),
      ['Gross Margin'].concat(T.gm.map(function(v){return fCr(v);})).concat([fCr(sm(T.gm))]),
      ['GM %'].concat(T.nv.map(function(v,i){return T.nv[i]?fp(T.gm[i]/T.nv[i]):'—';})).concat(['']),
      ['EBITDA'].concat(T.eb.map(function(v){return fCr(v);})).concat([fCr(sm(T.eb))]),
      ['EBITDA %'].concat(T.nv.map(function(v,i){return T.nv[i]?fp(T.eb[i]/T.nv[i]):'—';})).concat(['']),
      ['PAT'].concat(T.pat.map(function(v){return fCr(v);})).concat([fCr(sm(T.pat))]),
      ['Net Cash Flow'].concat(CF.ncf.map(function(v){return fCr(v);})).concat(['']),
      ['Cumulative CF'].concat(CF.cum.map(function(v){return fCr(v);})).concat([''])
    ];
    doc.autoTable({head:[cols],body:body,startY:startY,theme:'grid',
      headStyles:{fillColor:[42,90,60],fontSize:7,fontStyle:'bold'},
      bodyStyles:{fontSize:7.5},columnStyles:{0:{cellWidth:28,fontStyle:'bold'}},
      alternateRowStyles:{fillColor:[247,245,242]},margin:{left:14,right:14}});

    doc.save('BizPlan_'+S.name.replace(/[^\w]/g,'_')+'.pdf');
    b.textContent='⬇ PDF'; toast('PDF exported','success');
  }).catch(function(e){toast('PDF export failed: '+e.message,'error');b.textContent='⬇ PDF';});
}
